<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Wade Alexander Flournoy" />
    <meta name="keywords" content="Flashcards" />
    <meta name="description" content="flashcard web app" />
    <title>Flash Cards</title>
    <link rel="stylesheet" href="./assets/css/style.css" />
    <link rel="stylesheet" href="./assets/vendor/normalize.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Roboto+Serif:ital,opsz,wght@0,8..144,100..900;1,8..144,100..900&display=swap"
      rel="stylesheet"
    />
    <script src="./assets/js/index.js" type="module"></script>
  </head>
  <body>
    <div class="page">
      <header class="header">
        <h4 class="header__title">
          <a href="#home" class="header__link">Flash Cards</a>
        </h4>
        <nav class="nav">
          <ul class="nav__links">
            <li><a class="nav__link" href="#home">My Decks</a></li>
            <li><a class="nav__link" href="#about">About</a></li>
            <!-- <li><a class="nav__link" href="/proxy/5500/carousel.html">About</a></li> -->
          </ul>
        </nav>
      </header>
      <main class="page__main-content">
        <section id="home" class="decks">
          <h2 class="decks__title">My Decks</h2>
          <div class="wrapping-row">
            <ul class="decks__list wrapping-row__display-contents">
            <template id="deck-template">
              <li class="deck deck_color_green">
                <a href="#" class="deck__link"></a>
                <h2 class="deck__title"></h2>
                <div class="deck__row deck_color_green">
                  <p class="deck__count"></p>
                  <button
                    type="button"
                    aria-label="Delete this deck."
                    class="deck__delete-btn"
                  ></button>
                </div>
              </li>
            </template>
            </ul>
            <button type="button" class="decks__new-deck-btn">
              + New Deck
            </button>
          </div>
        </section>

        <section id="carousel" class="carousel">
          <h2 class="carousel__title">HTML Tags Deck &middot; 1/10</h2>
          <div class="carousel__row">
            <button
              type="button"
              aria-label="type left"
              class="carousel__btn carousel__btn_type_left carousel__btn_disabled"
            ></button>
            <div class="carousel__card">
              <p class="carousel__card-text">&lt;body&gt;&lt;/body&gt;</p>
            </div>
            <button
              type="button"
              aria-label="type right"
              class="carousel__btn carousel__btn_type_right"
            ></button>
          </div>
          <button
            type="button"
            aria-label="type flip"
            class="carousel__btn carousel__btn_type_flip"
          ></button>
        </section>
        
        <section id="not-found" class="not-found">
          <h2 class="not-found__status-code">404</h2>
          <p class="not-found__text">Sorry, nothing found!</p>
        </section>
      </main>
      <footer class="footer">
        <p class="footer__text">&copy; Wade Alexander Flournoy 2026</p>
      </footer>
    </div>
  </body>
</html>
